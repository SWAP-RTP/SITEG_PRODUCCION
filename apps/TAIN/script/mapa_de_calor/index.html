<style>
    #map {
        height: 100vh;
        width: 100%;
        margin: 0 auto;
    }

    #formulario {
        display: none !important;
    }

<body>

    <main class="container mt-4">
        <div class="card">
        
<form id="formulario" enctype="multipart/form-data">

    <div class="d-flex flex-wrap align-items-center justify-content-center mt-2 text-center">

        <div class="col-12 col-md-3 px-2">
            <input type="text" id="fecha_hora_inicial"
                   class="form-control"
                   aria-label="Fecha inicial">
        </div>

        <div class="col-12 col-md-3 px-2">
            <input type="text" id="fecha_hora_final"
                   class="form-control"
                   aria-label="Fecha final">
        </div>

    </div>

    <div class="mt-4 text-center">
        <button type="submit" class="btn btn-outline-success" id="btnFiltrarAccidentes">
            <i class="fa-regular fa-circle-check"></i>
        </button>

        <button type="reset" class="btn btn-outline-secondary">
            <i class="fa-solid fa-broom"></i>
        </button>
    </div>

    <div class="mt-3 text-center">
        <input type="text" id="numero_eventos"
               class="form-control text-center"
               readonly value="0"
               aria-label="Número de accidentes"
               style="max-width: 200px; margin: 0 auto;">
    </div>

</form>


        </div>        
            </div>
            
    <div id="map"></div>

    <script>
        // Inicializa el mapa de Leaflet
        const map = L.map('map').setView([19.3250, -99.1328], 12); // Valle de México

        // Cargar la capa de mapa base (OpenStreetMap)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // Función para cargar datos desde el servidor
        fetch('api/get_heatmap_data.php') // Asegúrate de colocar la ruta correcta
            .then(response => response.json())
            .then(data => {
                // Añadir la capa de Heatmap al mapa
                L.heatLayer(data, {
                    radius: 25, // Radio de influencia de cada punto
                    maxZoom: 13, // El máximo zoom para ver el mapa de calor
                    minOpacity: 0.4, // Opacidad mínima
                    max: 10  // Máximo valor de intensidad
                }).addTo(map);
            })
            .catch(error => console.error('Error al cargar los datos del mapa de calor:', error));
    </script>
