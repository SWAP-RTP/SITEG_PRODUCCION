<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Parque Vehicular</title>
    <link rel="shortcut icon" href="../img/Logo_RTP.png" type="image/x-icon">

    <!-- Bootstrap -->
    <link rel="stylesheet" href="../lib/Bootstrap-5-5.3.0/css/bootstrap.min.css">

    <!-- FontAwesome -->
    <link rel="stylesheet" type="text/css" href="../lib/fontawesome/css/all.min.css"/>

    <!-- style general -->
    <link rel="stylesheet" href="../css/style.css">

    <!-- Componentes -->
    <link rel="stylesheet" href="../css/style_componentes.css">
</head>
<body>

<!-- Contenido principal -->
<main>
    <div class="container mt-4">
        <div class="card shadow-sm">
            <div class="card-header">
                <h5 class="mb-0">
                    <i class="fas fa-bus me-2"></i>Registro de Parque Vehicular
                </h5>
            </div>

            <div class="card-body">
                <!-- Formulario principal -->
                <form id="formParqueVehicular">

                    <div class="row mb-3">

                        <!-- Select de módulos (se carga dinámicamente desde BD) -->
                        <div class="col-md-4">
                            <label class="form-label">Módulo</label>
                            <select class="form-select" name="modulo" id="selectModulo">
                                <option value="">Seleccione módulo</option>
                            </select>
                        </div>

                        <!-- Campo de fecha -->
                        <div class="col-md-4">
                            <label class="form-label">Fecha</label>
                            <input type="date" class="form-control" name="fecha">
                        </div>

                        <!-- Select de motivo (se carga dinámicamente desde BD)-->
                        <div class="col-md-4">
                            <label class="form-label">Motivo</label>
                            <select class="form-select" name="motivo" id="selectMotivo">
                                <option value="">Seleccione motivo</option>
                            </select>
                        </div>
                    </div>

                    <div class="mt-5 table-responsive overflow-auto" style="max-height: 300px;">
                        <table id="tabla_tipo_unidad" class="table table-striped table-bordered mb-0">
                            <thead class="table-light sticky-top">
                            <tr class="text-center">
                                <th>Tipo de Unidad</th>
                                <th>Total</th>
                            </tr>
                            </thead>
                            <tbody>
                                <!-- AQUI SE VA A PINTAR LO QUE NECESITAMOS -->
                            </tbody>
                        </table>
                    </div>
                </div>

                    <!-- Total general de unidades -->
                    <div class="row mt-3">
                        <div class="col-md-4 ms-auto">
                            <label class="form-label fw-bold">Total de unidades</label>
                            <input type="number" class="form-control text-center fw-bold" id="totalUnidades" value="0" readonly>
                        </div>
                    </div>

                    <div class="text-end mt-4">
                        <button type="button" class="btn btn-secondary" id="guardar" disabled>
                            <i class="fas fa-save me-1"></i> Guardar
                        </button>
                    </div>

                </form>
            </div>
        </div>
    </div>
</main>

<!-- Bootstrap -->
<script src="../lib/Bootstrap-5-5.3.0/js/bootstrap.bundle.min.js"></script>

<!-- jQuery -->
<script src="../lib/jQuery-3.7.0/jquery-3.7.0.min.js"></script>

<!-- SweetAlert2 -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<!-- Módulo principal -->
<script type="module" src="/formulario_captura/script/form_captura.js"></script>

</body>
</html>
