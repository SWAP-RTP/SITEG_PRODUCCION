    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const tabla = document.querySelector('#tabla-body-maestro');
        const inputBusqueda = document.querySelector('#busqueda-inventario');
        const btnRefresh = document.querySelector('#btn-refresh'); 
        const loader = document.querySelector('#loader-inventario');

        let inventarioLocal = [];

        function cargarDatos() {
            loader.classList.remove('d-none');
            setTimeout(() => {
                const registros = JSON.parse(localStorage.getItem('mis_recibos')) || [];
                const inventarioMap = {};

                registros.forEach(reg => {
                    const codigo = reg.codigo;
                    if (!inventarioMap[codigo]) {
                        inventarioMap[codigo] = {
                            codigo: codigo,
                            nombre: reg.nombre,
                            total: 0,
                            minimo: parseFloat(reg.minimo) || 5,
                            ubicacion: reg.ubicacion || 'ALMACÉN'
                        };
                    }
                    inventarioMap[codigo].total += parseFloat(reg.cuanto);
                });

                inventarioLocal = Object.values(inventarioMap);
                renderizar(inventarioLocal);
                actualizarResumen(inventarioLocal);
                loader.classList.add('d-none');
            }, 500);
        }

        function renderizar(datos) {
            tabla.innerHTML = '';
            if (datos.length === 0) {
                tabla.innerHTML = '<tr><td colspan="6" class="py-5 text-muted">No hay materiales.</td></tr>';
                return;
            }

            datos.forEach(item => {
                const stock = parseFloat(item.total);
                const min = parseFloat(item.minimo) || 1;
                const maxVisual = min * 3; 
                let porcentaje = Math.min((stock / maxVisual) * 100, 100);
                const porcentajeTexto = Math.round(porcentaje);

                let colorBarra = 'bg-success';
                let textoEstado = 'Stock disponible';
                let badgeColor = 'bg-success-subtle text-success border-success';

                if (stock <= min) {
                    colorBarra = 'bg-danger';
                    textoEstado = '¡Surtir ya!';
                    badgeColor = 'bg-danger text-white';
                } else if (stock <= min * 1.5) {
                    colorBarra = 'bg-warning text-dark';
                    textoEstado = 'Bajo stock';
                    badgeColor = 'bg-warning-subtle text-warning border-warning';
                }

                tabla.innerHTML += `
                    <tr>
                        <td class="fw-bold text-secondary small">${item.codigo}</td>
                        <td class="text-start"><div class="fw-bold text-dark">${item.nombre}</div></td>
                        <td style="min-width: 180px;">
                            <div class="d-flex justify-content-between mb-1 small">
                                <span class="fw-bold ${stock <= min ? 'text-danger' : 'text-dark'}">${stock}</span>
                            </div>
                            <div class="progress" style="height: 18px; background-color: #e9ecef; border-radius: 10px;">
                                <div class="progress-bar progress-bar-striped ${colorBarra}" 
                                     style="width: ${porcentaje}%; font-size: 0.75rem;">
                                     ${porcentajeTexto >= 20 ? porcentajeTexto + '%' : ''}
                                </div>
                            </div>
                        </td>
                        <td class="text-muted small">${min}</td>
                        <td><span class="badge bg-light text-dark border">${item.ubicacion}</span></td>
                        <td><span class="badge-stock ${badgeColor}">${textoEstado}</span></td>
                    </tr>`;
            });
        }

        function actualizarResumen(datos) {
            document.querySelector('#total-articulos').innerText = datos.length;
            const criticos = datos.filter(i => parseFloat(i.total) <= parseFloat(i.minimo)).length;
            document.querySelector('#total-critico').innerText = criticos;

            const contenedor = document.querySelector('#contenedor-detalles-produccion');
            contenedor.innerHTML = ''; 
            datos.forEach(item => {
                const esCritico = parseFloat(item.total) <= parseFloat(item.minimo);
                contenedor.innerHTML += `
                    <div class="col-6 col-md-3">
                        <div class="p-3 border rounded shadow-sm bg-white text-center">
                            <div class="small text-muted text-uppercase fw-bold" style="font-size: 0.65rem;">${item.nombre}</div>
                            <div class="h4 fw-bold mb-0 ${esCritico ? 'text-danger' : 'text-primary'}">${item.total}</div>
                        </div>
                    </div>
                `;
            });
        }

        if(inputBusqueda) {
            inputBusqueda.addEventListener('input', (e) => {
                const b = e.target.value.toLowerCase().trim();
                const filtrados = inventarioLocal.filter(i => 
                    i.nombre.toLowerCase().includes(b) || i.codigo.toLowerCase().includes(b)
                );
                renderizar(filtrados);
            });
        }

        btnRefresh.addEventListener('click', cargarDatos);
        cargarDatos();
    });
    </script>
