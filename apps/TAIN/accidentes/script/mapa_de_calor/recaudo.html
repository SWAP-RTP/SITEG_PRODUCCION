<!DOCTYPE html>
<html lang="es">
<head>
        <link rel="stylesheet" type="text/css" href="/public/assets/Bootstrap-5-5.3.0/css/bootstrap.min.css">
        <link rel="stylesheet" type="text/css" href="/public/assets/fontawesome/css/all.min.css" />
        <link rel="stylesheet" type="text/css" href="/public/assets/DataTables-2.0.1/css/dataTables.bootstrap5.min.css">
        <link rel="stylesheet" type="text/css" href="/public/assets/Buttons-3.0.0/css/buttons.bootstrap5.min.css">
        <link rel="stylesheet" href="../../css/Estilos.css">
        <link rel="icon" href="../../img/curita3.png" type="image/x-icon">
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
        <script src="js/dist/leaflet-heat.js"></script>
        <style>

/* Barra superior */
.filtro-bar {
    border-radius: 14px;
    background: #ffffff;
    box-shadow: 0 4px 14px rgba(0,0,0,0.08);
}

/* Botón fecha */
.btn-fecha {
    border-radius: 999px;
    padding: 6px 14px;
    font-weight: 500;
    background: #f8f9fa;
}

/* Select ruta */
.select-ruta {
    border-radius: 999px;
    padding-left: 14px;
    font-weight: 500;
}

/* Botón filtrar */
.btn-filtrar {
    border-radius: 999px;
    padding: 6px 18px;
    font-weight: 600;
    box-shadow: 0 3px 8px rgba(25,135,84,0.3);
}

/* Hover suave */
.btn-fecha:hover,
.select-ruta:hover {
    background-color: #eef2f5;
}

        #map {
            height: 100vh;
            width: 100%;
        }
        #formulario {
            display: none !important;
        }
</style>

</head>
<body>
<div class="container-fluid position-fixed top-0 start-0 z-3 py-2">
    <div class="d-flex justify-content-center align-items-center gap-2 flex-nowrap filtro-bar px-3">

        <button class="btn btn-outline-primary btn-fecha" id="btnFecha">
            <i class="fa-regular fa-calendar"></i> Fecha
        </button>
        <input type="text" id="fechaFiltro" class="d-none">

        <select class="form-select select-ruta" id="selectRuta" style="width: 170px;">
            <option value="" selected>Ruta: Seleccionar</option>
            <option value="9A">9A</option>
            <option value="9B">9B</option>
            <option value="9C">9C</option>
            <option value="110">110</option>
        </select>

        <button class="btn btn-success btn-filtrar" id="btnFiltrar">
            <i class="fa-solid fa-filter"></i> FILTRAR
        </button>

    </div>
</div>


    <main class="container mt-4">
        <div class="card">
<form id="formulario" enctype="multipart/form-data">

    <div class="d-flex flex-wrap align-items-center justify-content-center mt-2 text-center">

        <div class="col-12 col-md-3 px-2">
            <input type="text" id="fecha_hora_inicial"
                   class="form-control"
                   aria-label="Fecha inicial">
        </div>

        <div class="col-12 col-md-3 px-2">
            <input type="text" id="fecha_hora_final"
                   class="form-control"
                   aria-label="Fecha final">
        </div>

    </div>

    <div class="mt-4 text-center">
        <button type="submit" class="btn btn-outline-success" id="btnFiltrarAccidentes">
            <i class="fa-regular fa-circle-check"></i>
        </button>

        <button type="reset" class="btn btn-outline-secondary">
            <i class="fa-solid fa-broom"></i>
        </button>
    </div>

    <div class="mt-3 text-center">
        <input type="text" id="numero_eventos"
               class="form-control text-center"
               readonly value="0"
               aria-label="Número de accidentes"
               style="max-width: 200px; margin: 0 auto;">
    </div>

</form>
        </div>        
        </div>
        <div id="map"></div>

    <script>
        const map = L.map('map').setView([19.3250, -99.1328], 12); 
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);
        fetch('api/get_heatmap_data.php') 
            .then(response => response.json())
            .then(data => {
                L.heatLayer(data, {
                    radius: 25, 
                    maxZoom: 13, 
                    minOpacity: 0.4, 
                    max: 10 
                }).addTo(map);
            })
            .catch(error => console.error('Error al cargar los datos del mapa de calor:', error));
    </script>
        <script type="text/javascript" src="/public/assets/jQuery-3.7.0/jquery-3.7.0.min.js"></script>
        <script type="text/javascript" src="/public/assets/Bootstrap-5-5.3.0/js/bootstrap.bundle.min.js"></script>
        <script>
        document.addEventListener("DOMContentLoaded", function () {

            let rutaSeleccionada = null;

            document.getElementById("selectRuta").addEventListener("change", function () {
                rutaSeleccionada = this.value;
                console.log("Ruta seleccionada:", rutaSeleccionada);
            });

        });
        </script>

        <script type="text/javascript" src="/public/assets/sweetalert2.all.min.js"></script>
        <script type="text/javascript" src="/public/assets/fontawesome/js/all.min.js"></script>
        <script type="text/javascript" src="/public/assets/DataTables-2.0.1/js/dataTables.min.js"></script>
        <script type="text/javascript" src="/public/assets/DataTables-2.0.1/js/dataTables.bootstrap5.min.js"></script>
        <script type="text/javascript" src="/public/assets/Buttons-3.0.0/js/dataTables.buttons.min.js"></script>
        <script type="text/javascript" src="/public/assets/Buttons-3.0.0/js/buttons.bootstrap5.min.js"></script>
        <script type="text/javascript" src="/public/assets/JSZip-3.10.1/jszip.min.js"></script>
        <script type="text/javascript" src="/public/assets/Buttons-3.0.0/js/buttons.html5.min.js"></script>
        <script type="text/javascript" src="/public/assets/Buttons-3.0.0/js/buttons.print.min.js"></script>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
        <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
        <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/es.js"></script>
                <script>
                flatpickr("#fechaFiltro", {
                locale: "es",
                mode: "range",
                dateFormat: "Y-m-d",
                onOpen: () => document.getElementById("btnFecha").classList.add("active"),
                onClose: () => document.getElementById("btnFecha").classList.remove("active")});
                document.getElementById("btnFecha").addEventListener("click", () => {
                document.getElementById("fechaFiltro")._flatpickr.open();});
                </script>
        <script type="module" src="scripts/recaudacion.js"></script>
</body>
</html>
