name: Respaldo automatico PostgreSQL

on:
  schedule:
    # Diario a las 03:00 UTC
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      destino:
        description: "Donde guardar el respaldo"
        required: true
        default: artifact
        type: choice
        options:
          - artifact
          - git
          - local

permissions:
  contents: write

jobs:
  backup-postgres:
    timeout-minutes: 10
    runs-on: [self-hosted, linux]
    env:
      PGHOST: ${{ secrets.PGHOST }}
      PGPORT: ${{ secrets.PGPORT }}
      PGDATABASE: ${{ secrets.PGDATABASE }}
      PGUSER: ${{ secrets.PGUSER }}
      PGPASSWORD: ${{ secrets.PGPASSWORD }}
      PGCONNECT_TIMEOUT: "15"
      PGHOST_DEFAULT: "10.10.30.28"
      PGPORT_DEFAULT: "5432"
      PGDATABASE_DEFAULT: "desarrollo"
      PGUSER_DEFAULT: "usuario"
      PGPASSWORD_DEFAULT: "usuario"
      BACKUP_DIR: backups/postgres
      BACKUP_LOCAL_DIR: ${{ vars.BACKUP_LOCAL_DIR }}

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Instalar cliente de PostgreSQL
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Cargar valores por defecto
        run: |
          echo "PGHOST=${PGHOST:-$PGHOST_DEFAULT}" >> "$GITHUB_ENV"
          echo "PGPORT=${PGPORT:-$PGPORT_DEFAULT}" >> "$GITHUB_ENV"
          echo "PGDATABASE=${PGDATABASE:-$PGDATABASE_DEFAULT}" >> "$GITHUB_ENV"
          echo "PGUSER=${PGUSER:-$PGUSER_DEFAULT}" >> "$GITHUB_ENV"
          echo "PGPASSWORD=${PGPASSWORD:-$PGPASSWORD_DEFAULT}" >> "$GITHUB_ENV"
          echo "BACKUP_LOCAL_DIR=${BACKUP_LOCAL_DIR:-/opt/postgres_backups}" >> "$GITHUB_ENV"

      - name: Validar variables obligatorias
        run: |
          test -n "$PGHOST" || (echo "Falta PGHOST" && exit 1)
          test -n "$PGPORT" || (echo "Falta PGPORT" && exit 1)
          test -n "$PGDATABASE" || (echo "Falta PGDATABASE" && exit 1)
          test -n "$PGUSER" || (echo "Falta PGUSER" && exit 1)
          test -n "$PGPASSWORD" || (echo "Falta PGPASSWORD" && exit 1)

      - name: Verificar conectividad a PostgreSQL
        run: |
          export PGPASSWORD="$PGPASSWORD"
          pg_isready \
            --host="$PGHOST" \
            --port="$PGPORT" \
            --username="$PGUSER" \
            --dbname="$PGDATABASE" \
            --timeout=10

      - name: Diagnostico de conexion
        run: |
          export PGPASSWORD="$PGPASSWORD"
          export PGSSLMODE="${PGSSLMODE:-prefer}"
          echo "Host: $PGHOST"
          echo "Puerto: $PGPORT"
          echo "Base: $PGDATABASE"
          echo "Usuario: $PGUSER"
          echo "SSL mode: $PGSSLMODE"
          getent hosts "$PGHOST" || true
          psql \
            --host="$PGHOST" \
            --port="$PGPORT" \
            --username="$PGUSER" \
            --dbname="$PGDATABASE" \
            --command="select now() as fecha_servidor, current_user as usuario;"

      - name: Preparar nombre de archivo
        run: |
          DATESTAMP=$(date +"%Y%m%d_%H%M%S")
          mkdir -p "$BACKUP_DIR"
          FILE_PATH="$BACKUP_DIR/${PGDATABASE}_${DATESTAMP}.dump"
          echo "DATESTAMP=$DATESTAMP" >> "$GITHUB_ENV"
          echo "FILE_PATH=$FILE_PATH" >> "$GITHUB_ENV"

      - name: Generar respaldo con pg_dump
        run: |
          export PGPASSWORD="$PGPASSWORD"
          export PGSSLMODE="${PGSSLMODE:-prefer}"
          pg_dump \
            --host="$PGHOST" \
            --port="$PGPORT" \
            --username="$PGUSER" \
            --dbname="$PGDATABASE" \
            --verbose \
            --no-owner \
            --no-privileges \
            --format=custom \
            --blobs \
            --file="$FILE_PATH"

      - name: Subir respaldo como Artifact
        if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.destino == 'artifact') }}
        uses: actions/upload-artifact@v4
        with:
          name: postgres-backup-${{ env.PGDATABASE }}-${{ env.DATESTAMP }}
          path: ${{ env.FILE_PATH }}
          retention-days: 30

      - name: Guardar respaldo en carpeta local
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.destino == 'local' }}
        run: |
          mkdir -p "$BACKUP_LOCAL_DIR"
          cp "$FILE_PATH" "$BACKUP_LOCAL_DIR/"
          ls -lh "$BACKUP_LOCAL_DIR"

      - name: Limpiar respaldos antiguos en Git (deja 15)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.destino == 'git' }}
        run: |
          ls -1t "$BACKUP_DIR"/*.dump 2>/dev/null | tail -n +16 | xargs -r rm -f

      - name: Guardar respaldo en Git
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.destino == 'git' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$BACKUP_DIR"
          git commit -m "backup: postgres $DATESTAMP" || echo "Sin cambios para commit"
          git push
