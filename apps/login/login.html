<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="shortcut icon" href="./img/Logo_RTP.png" type="image/x-icon">
  <!-- TÍTULO DE LA PÁGINA -->
  <title>SINTEG</title>
  <!-- Fuente -->
  <link href="https://fonts.googleapis.com/css?family=Roboto:400,300,100,500,700,900" rel="stylesheet"
    type="text/css" />
  <!-- BOOTSTRAP CSS -->
  <link href="./lib/Bootstrap-5-5.3.0/css/bootstrap.min.css" rel="stylesheet" type="text/css" />
  <!-- CSS -->
  <!-- Estilos CSS ----------------------------------->
  <link rel="stylesheet" href="./includes/css/loginStyle.css" />
  <link rel="stylesheet" type="text/css" href="./lib/fontawesome/css/all.min.css" />
  <!-- Alertas Notyf -->
  <link rel="stylesheet" href="./lib/Notyf/notyf.min.css">
</head>

<body>
  <!-- Main Container ----------------------------------------------------------------->
  <main class="container d-flex flex-column justify-content-center align-items-center">

    <div class="contenedor_carga" hidden>
      <div class="loader"></div>
      <div class="loading-text">Cargando..</div>
    </div>


    <!-- toast
    <button type="button" class="btn btn-primary" id="liveToastBtn">Show live toast</button> -->

    <!-- toast alerta -->
    <div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1080; margin-top: 50px;">
      <div id="myToast" class="toast bg-danger text-white border-0 shadow" role="alert" aria-live="assertive"
        aria-atomic="true">
        <div class="toast-header bg-danger text-white border-0">
          <i class="fa-solid fa-circle-exclamation me-2"></i>
          <strong class="me-auto">Swap</strong>
          <small>Ahora mismo</small>
          <button type="button" class="btn-close btn-close-white ms-2 mb-1" data-bs-dismiss="toast"></button>
        </div>
        <div class="toast-body">
          Los datos de acceso son incorrectos. Por favor, inténtalo de nuevo.
        </div>
      </div>
    </div>
    <!-- fin toast -->



    <!--LOGIN ------------------------------------>
    <section id="card_login" class="border rounded-5 p-4 mx-auto ">
      <section class="d-flex flex-column flex-md-row align-items-center justify-content-center gap-4">

        <section class="col-5">
          <form action="auth/auth.php" method="POST" id="loginForm">
            <section class="mb-3">
              <label for="ingresaUsuario" class="form-label fw-bold">Usuario</label>
              <input id="ingresaUsuario" name="ingresaUsuario" type="text"
                class="form-control form-control-lg fs-6 text-center" />
            </section>

            <section class="mb-3">
              <label for="ingresaPassword" class="form-label fw-bold">Contraseña</label>
              <div class="input-group">
                <input id="ingresaPassword" name="ingresaPassword" type="password"
                  class="form-control form-control-lg fs-6 text-center" />
                <button id="showPasswordBtn" class="btn btn-outline-secondary" type="button"
                  onclick="mostrarPassword();">
                  <i id="eyeIcon" class="fas fa-eye"></i>
                </button>
              </div>
            </section>

            <button class="btn btn-lg btn-primary w-100 fs-6 mt-4" id="btn_toast" type="submit">
              <i class="fa-solid fa-right-to-bracket"></i> Entrar
            </button>
          </form>

          <div class="text-center mt-3">
            <a href="https://www.rtp.cdmx.gob.mx/">MÁS SOBRE RTP</a>
          </div>
        </section>

        <section class="featured-image text-center">
          <img src="./img/logoRTPMI.png" class="img-fluid" width="650" />
          <h3 class="mt-3">Sistema Integrado (SINTEG)</h3>
        </section>

      </section>
    </section>

  </main>
  <!-- Scripts JS de Bootstrap  --------------------------------------->
  <script src="./lib/Bootstrap-5-5.3.0/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
  <!-- Fontawesome -->
  <script type="text/javascript" src="./lib/fontawesome/js/all.min.js"></script>
  <!-- Scripts JS JQuery  --------------------------------------->
  <script src="./lib/jQuery-3.7.0/jquery-3.7.0.min.js"></script>
  <!-- Script Notyf -->
  <script src="./lib/Notyf/notyf.min.js"></script>
  <!-- Scripts de Login----------------->
  <script src="./includes/js/index.js"></script>
</body>

</html>
