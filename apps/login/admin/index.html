    <script>
        // Manejo de tabs sin recargar la tabla ni la página
        document.querySelectorAll('.nav-link[data-tab]').forEach(tab => {
            tab.addEventListener('click', function (e) {
                e.preventDefault();
                // Quitar clase active de todas las pestañas
                document.querySelectorAll('.nav-link[data-tab]').forEach(t => t.classList.remove('active'));
                // Ocultar todos los contenidos
                document.getElementById('contenido-usuarios').style.display = 'none';
                document.getElementById('contenido-modulos').style.display = 'none';
                document.getElementById('contenido-permisos').style.display = 'none';
                // Mostrar el contenido seleccionado
                const tabName = this.getAttribute('data-tab');
                document.getElementById('contenido-' + tabName).style.display = 'block';
                // Activar la pestaña seleccionada
                this.classList.add('active');
            });
        });
    </script>
