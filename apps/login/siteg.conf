# # apps/login/siteg.conf
# <VirtualHost *:80>
#     ServerAdmin webmaster@localhost
#     DocumentRoot /var/www/html

#     ErrorLog ${APACHE_LOG_DIR}/error.log
#     CustomLog ${APACHE_LOG_DIR}/access.log combined

#     # ----------------------------------------------------
#     # Configuración principal de SITEG (Login/Menú)
#     # Servir archivos estáticos/PHP desde /var/www/html
#     # ----------------------------------------------------
#     <Directory /var/www/html>
#         Options Indexes FollowSymLinks
#         AllowOverride All
#         Require all granted
#     </Directory>

#     # ----------------------------------------------------
#     # 🛣️ Enrutamiento Interno 1: app_swap
#     # El usuario accede a: http://localhost:8081/app-swap/
#     # ----------------------------------------------------
#     ProxyPassMatch "^/app-swap/(.*)$" "http://app_swap:80/$1"
#     ProxyPassReverse "/app-swap/" "http://app_swap:80/"

#     # ----------------------------------------------------
#     # 🛣️ Enrutamiento Interno 2: app_sugo
#     # El usuario accede a: http://localhost:8081/app-sugo/
#     # ----------------------------------------------------
#     ProxyPass "/app-sugo/" "http://app_sugo:3000/"
#     ProxyPassReverse "/app-sugo/" "http://app_sugo:3000/"

# </VirtualHost>
<VirtualHost *:80>
    DocumentRoot /var/www/html
    
    # 1. Configuración para procesar archivos locales (Login/Menú)
    <Directory /var/www/html>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
        DirectoryIndex login.php login.html index.php
    </Directory>

    # 2. Proxy para SWAP
    # Cuando el usuario vaya a http://localhost:8086/swap
    ProxyPreserveHost On
    ProxyPass /swap http://app_swap/
    ProxyPassReverse /swap http://app_swap/

    # 3. Proxy para TAIN
    # Cuando el usuario vaya a http://localhost:8086/tain
    ProxyPass /tain http://app_tain/
    ProxyPassReverse /tain http://app_tain/

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>