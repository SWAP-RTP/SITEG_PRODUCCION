<!-- Modal Nuevo Curso Curricular -->
<div class="modal fade" aria-hidden="true" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" id="ModalCursos">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">
      <!-- Encabezado -->
      <div class="modal-header">
        <h4 class="modal-title" id="title"></h4>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>

      <!-- Cuerpo -->
      <div class="modal-body">  
        <form id="formulario-cursos">
          <input type="hidden" id="clave_curso" name="clave_curso">
          <div class="form-row mb-2">
            <label style="margin-left: 166px; color: white;"><b>Fecha: </b></label>
            <div class="col-md-7" style="margin-left: 20px;">
                <input type="date" class="form-control" name="fecha_curso" id="fecha_curso"/>
            </div>
          </div>  
          
          <div class="form-row mb-2">
            <label style="margin-left:72px; color: white;"><b>Nombre del Curso: </b></label>
            <div class="col-md-7" style="margin-left:20px">
                <textarea type="text" class="form-control" name="nombre_curso" id="nombre_curso"></textarea>
            </div>
          </div>

          <div class="form-row mb-2">
            <label style="margin-left:128px; color: white;"><b>Institucion: </b></label>
            <div class="col-md-7" style="margin-left:20px">
                <input type="text" class="form-control" name="institucion_curso" id="institucion_curso"/>
            </div>
          </div> 
        </form>
      </div>

      <!-- Pie -->
      <div class="modal-footer" id="footer">
        <button type="button" class="btn btn-light" id="BtnGuardarCursos" name="BtnGuardarCursos"><i class="fas fa-clipboard-check"></i> Guardar Curso</button>
        <button type="button" class="btn btn-light" id="BtnEditarCursos" name="BtnEditarCursos"><i class="fa-solid fa-pen-clip"></i> Editar Curso</button>
      </div>
    
    </div>
  </div>
</div>




<!-- Modal Nuevo Familiar -->
<div class="modal fade" id="ModalFamiliar"  data-bs-backdrop="static" data-bs-keyboard="false" aria-hidden="true" tabindex="-1">
  <div class="modal-dialog modal-xl modal-dialog-centered">
    <div class="modal-content">

      <!-- Encbezado -->
      <div class="modal-header">
        <h4 class="modal-title" id="title-familiar"></h4>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>

      <!-- Cuerpo -->
      <div class="modal-body">    
        <form id="formulario-familiar">
          <input type="hidden" name="id_familiar" id="id_familiar">
          <div class="form-row mb-2">
            <label style="color: white;"><b>Apellido Paterno: </b></label>
            <div class="col-md-2" style="margin-left:20px">
                <input type="text" class="form-control" name="ap_paterno_familiar" id="ap_paterno_familiar"/>
            </div>
            <label style="margin-left:25px; color: white;"><b>Apellido Materno: </b></label>
            <div class="col-md-2" style="margin-left:20px">
                <input type="text" class="form-control" name="ap_materno_familiar" id="ap_materno_familiar"/>
            </div>
            <label style="margin-left:25px; color: white;"><b>Nombre(s): </b></label>
            <div class="col-md-2" style="margin-left:22px">
                <input type="text" class="form-control" name="nombre_familiar" id="nombre_familiar"/>
            </div>
          </div>

          <div class="form-row mb-2">
            <label style="color: white;"><b>Fecha Nacimiento: </b></label>
            <div class="col-md-2" style="margin-left:12px">
                <input type="date" class="form-control" name="fecha_nacimiento_familiar" id="fecha_nacimiento_familiar"/>
            </div>
            <label style="margin-left:120px; color: white;"><b>Sexo: </b></label>
            <div class="col-md-2" style="margin-left:22px">
                <select type="select" class="form-select" name="sexo_familiar" id="sexo_familiar">
                    <option value="" disabled selected>Seleccionar</option>
                    <option value="1">MASCULINO</option>
                    <option value="2">FEMENINO</option>
                </select>
            </div>
            <label style="margin-left:40px; color: white;"><b>Telefono: </b></label>
            <div class="col-md-2" style="margin-left:22px">
                <input type="number" class="form-control" name="telefono_familiar" id="telefono_familiar"/>
            </div>
          </div> 
          
          <div class="form-row mb-2">
            <label style="color: white;"><b>Parentesco: </b></label>
            <div class="col-md-2" style="margin-left:65px">
                <select class="form-select" name="parentesco_familiar" id="parentesco_familiar">
                    <option value="" disabled selected>Seleccionar</option>
                </select>
            </div>
            <!-- <input type="hidden" name="finado_familiar" value="0"> -->
            <label style="margin-left:105px; color: white;" class="form-check-label" for="finado_familiar" ><b> Finado: </b></label>
            <div class="form-check form-switch" style="margin-left:25px">
              <input class="form-check-input" type="checkbox" role="switch" id="finado_familiar" name="finado_familiar">
            </div>
            <label style="margin-left:168px; color: white;"><b>Porcentaje: </b></label>
            <div class="col-md-2" style="margin-left:20px">
                <input type="number" class="form-control" name="porcentaje_familiar" id="porcentaje_familiar" min="0" max="100" placeholder="0 - 100"/>
            </div>
          </div> 
        </form>
      </div>

      <!-- Pie -->
      <div class="modal-footer" id="footer">
        <button type="button" class="btn btn-light" id="BtnEditarFamiliar" name="BtnEditarFamiliar"><i class="fa-solid fa-pen-clip"></i> Editar Familiar</button>
        <button type="button" class="btn btn-light" id="BtnGuardaFamiliar" name="BtnGuardaFamiliar"><i class="fas fa-user-friends"></i> Guardar Familiar</button>
      </div>
    </div>
  </div>
</div>


<!-- Modal Cambio de Foto -->
<div class="modal fade" aria-hidden="true" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" id="ModalFoto">
  <div class="modal-dialog modal-s modal-dialog-centered">
    <div class="modal-content">
      <!-- Encabezado -->
      <div class="modal-header">
        <h4 class="modal-title">Editar Foto</h4>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>

      <!-- Cuerpo -->
      <div class="modal-body"> 
        <form id="formulario-foto" enctype="multipart/form-data">
          <div class="form-row mb-2">
            <img id="foto_trabajador" name="foto_trabajador" src="" alt="Foto del Trabajador" ></img>
          </div>
          <div class="form-row">
            <input type="file" class="form-control btn btn-primary" id="foto_nueva" name="foto_nueva" accept="image/*">
          </div>
        </form>
      </div>
      
      <!-- Pie -->
      <div class="modal-footer" id="footer">
          <button type="button" class="btn btn-light" id="BtnEditarFoto" name="BtnEditarFoto"><i class="far fa-edit"></i> Guardar Nueva Foto</button>
      </div>
    
    </div>
  </div>
</div>


<!-- Modal Editar Talla -->
<div class="modal fade" aria-hidden="true" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" id="ModalTallas">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">
      <!-- Encabezado -->
      <div class="modal-header">
        <h4 class="modal-title">Modificaci&oacute;n de Tallas</h4>

      </div>

      <!-- Cuerpo -->
      <div class="modal-body">  
        <form id="formulario-tallas">
          <input type="hidden" id="id_talla" name="id_talla">

            <label style="margin-left: 80px; color: white;"><b>Prenda: </b></label>
            <div class="col-md-7" style="margin-left: 40px;">
                <input type="text" class="form-control" name="prenda" id="prenda" style="background-color: #d3d3d3;" readonly/>
            </div>
          </div>  
          
          <div class="form-row mb-2">
            <label style="margin-left:98px; color: white;"><b>Talla: </b></label>

                <input type="text" class="form-control" name="talla" id="talla"></input>
            </div>
          </div>

        </form>
      </div>

      <!-- Pie -->
      <div class="modal-footer" id="footer">
        <button type="button" class="btn btn-light" id="BtnEditarTalla" name="BtnEditarTalla"><i class="fa-solid fa-pen-clip"></i> Editar Talla</button>
      </div>
    
    </div>
  </div>
</div>
